<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тооны машин</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="calc">
    <div class="display" id="display">0</div>
    <div class="grid">
      <button class="function" data-action="del">DEL</button>
      <button class="function" data-action="clear">C</button>
      <button class="teal" oneClick="appendValue('(')">(</button>
      <button class="teal" oneClick="appendValue(')')">)</button>
      <button class="teal" data-action="square">x<sup>2</sup></button>
      <button class="teal" data-action="sqrt">√</button>

      <button class="num" oneClick="appendValue('7')">7</button>
      <button class="num" oneClick="appendValue('8')">8</button>
      <button class="num" oneClick="appendValue('9')">9</button>
      <button class="num" oneClick="appendValue('4')">4</button>
      <button class="num" oneClick="appendValue('5')">5</button>
      <button class="num" oneClick="appendValue('6')">6</button>
      <button class="num" oneClick="appendValue('1')">1</button>
      <button class="num" oneClick="appendValue('2')">2</button>
      <button class="num" oneClick="appendValue('3')">3</button>
      <button class="num" data-action="negate">+/-</button>
      <button class="num" oneClick="appendValue('0')">0</button>
      <button class="num" oneClick="appendValue('.')">.</button>

      <button class="teal" id="mul" data-val="×">×</button>
      <button class="teal" id="add" data-val="+">+</button>
      <button class="teal" id="sub" data-val="-">-</button>
      <button class="teal" id="div" data-val="÷">÷</button>
      <button class="operator" id="eq"  onclick="calculate()">=</button>
    </div>
  </div>
</body>
</html>
