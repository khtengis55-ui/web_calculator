<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тооны машин</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="calc">
    <div class="display" id="display">0</div>
    <div class="grid">
      <button class="teal" data-action="del">DEL</button>
      <button class="teal" data-action="clear">C</button>
      <button class="teal" data-val="(">(</button>
      <button class="teal" data-val=")">)</button>
      <button class="teal" data-action="square">x<sup>2</sup></button>
      <button class="teal" data-action="sqrt">√</button>

      <button class="num" data-val="7">7</button>
      <button class="num" data-val="8">8</button>
      <button class="num" data-val="9">9</button>
      <button class="num" data-val="4">4</button>
      <button class="num" data-val="5">5</button>
      <button class="num" data-val="6">6</button>
      <button class="num" data-val="1">1</button>
      <button class="num" data-val="2">2</button>
      <button class="num" data-val="3">3</button>
      <button class="num" data-action="negate">+/-</button>
      <button class="num" data-val="0">0</button>
      <button class="num" data-val=".">.</button>

      <button class="teal" id="mul" data-val="×">×</button>
      <button class="teal" id="add" data-val="+">+</button>
      <button class="teal" id="sub" data-val="-">-</button>
      <button class="teal" id="div" data-val="÷">÷</button>
      <button class="teal" id="eq"  data-action="equals">=</button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
